<!DOCTYPE html>
{% load static %}
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login</title>
		<link rel="stylesheet" type="text/css" href="{% static 'CSS/log.css' %}">
		<link rel="stylesheet" type="text/css" href="{% static 'CSS/messages.css' %}">
		<link
			href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
			rel="stylesheet" />
			<script src="{% static 'JS/Validation.js' %}"></script>
			<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		
	
	</head>
			
	  	<div class="cont">
			
			<div class="message-container">
				{% for message in messages %}
				<div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
					<i class='bx bxs-error-circle'></i> <strong>{{ message }}</strong>
					<button type="button" class="close" data-dismiss="alert" aria-label="Close">
						<span aria-hidden="true">&times;</span>
					</button>
				</div>
				{% endfor %}
			</div>

		    <div class="container">
			<form action="/Login/" method="post"  onsubmit="return validateLoginForm()">
				{% csrf_token %}
				<h1>Login</h1>
				<div class="input-box">
					<input
						type="text"
						placeholder="Username"
						name="username"
						id="username" />
					<i class="bx bx-user"></i>
					<div class="error" id="username-error"></div>
				</div>
				<div class="input-box">
					<input
						type="password"
						placeholder="Password"
						name="password"
						id="password" />
					<i class="bx bx-lock-alt"></i>
					<div class="error" id="password-error"></div>
				</div>
				
				<button type="submit" class="btn">Login</button>
				<div class="register">
					<p>Don't have an account? <a href="/signup">Sign Up</a></p>
				</div>
			</div>
			</form>
		</div>
		<script>
			$(document).ready(function(){
				$(".close").click(function(){
					$(this).parent().remove(); // Remove the parent element of the close button
				});
			});
			</script>
			dy> 
			<style>
				body {
					display: flex;
					justify-content: center;
					align-items: center;
					min-height: 100vh;
					background-image: url("{% static 'Images/libb.avif' %}");
					background-size: cover;
					background-position: center;
					background-repeat: no-repeat;
				}
			</style>
	</body>
</html>
