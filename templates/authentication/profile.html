<!DOCTYPE html>
{% load static %}
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Profile</title>
		<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Pacifico&display=swap" rel="stylesheet" />
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css"
			rel="stylesheet" />
	
	    <script defer src="{% static 'JS/footer.js' %}"></script>
		<link rel="stylesheet" href="{% static 'CSS/navba.css' %}" />
		<link rel="stylesheet" href="{% static 'CSS/profilUsers.css' %}" />
		<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	</head>
	<body>

			<div class="cont">
				<div class="navbar">
					<div class="logo">
						<h1>BookNest</h1>
					</div>
					<nav>
						<!--SEARCH FORM-->
						<form method="GET" action="{% url 'categories' %}" class="form-inline ml-3">
							<div class="search-wrapper">
								<input class="form-control form-control-navbar" id="searchInput" name="search_name" type="search" placeholder="Search books...">
								<button class="search-icon" type="submit">
									<i class="fas fa-search"></i>
								</button>
							</div>
						</form>
					</nav>
					<div class="log_buttons">
						{% if user.is_authenticated %}
							<button class="log_btn" type="submit"><a href="/signout">Log Out</a></button>
						{% else %}
							<button class="log_btn" type="submit"><a href="/signup">Sign up</a></button>
							<button class="log_btn" type="submit"><a href="/Login">Log in</a></button>
						{% endif %}
					</div>
				</div>
				<nav>
					<ul class="links">
						<li class="activ"><a href="{% url 'home' %}">Home</a></li>
						<li><a href="{% url 'my_books' %}">My Books</a></li>
						<li><a href="{% url 'categories' %}">Categories</a></li>
						<li><a href="{% url 'profile' %}">Profile</a></li>
					</ul>
				</nav>
			</div>
		<main>
			<section id="user-info">
				<h2>Account Infromation</h2>
				<form>
					<label for="fname">First Name:</label><br />
					<input type="text" id="fname" placeholder="Omar" /><br /><br />
					<label for="lname">Last Name:</label><br />
					<input type="text" id="lname" placeholder="Yousef" /><br /><br />
					<label for="username">Username:</label><br />
					<input type="text" id="username" placeholder="Usfomar" /><br /><br />
					<label for="email">E-mail:</label><br />
					<input
						type="email"
						id="email"
						placeholder="OmarSam@example.com" /><br /><br />
					<label for="phone">Phone Number:</label><br />
					<input type="email" id="ph" placeholder="01003365894" /><br /><br />
					<label for="admin">Admin</label>
					<input
						type="radio"
						id="admin"
						name="is_admin"
						placeholder="yes"
						disabled />
					<label for="user">User</label>
					<input
						type="radio"
						id="user"
						name="is_admin"
						placeholder="no"
						disabled
						checked /><br /><br />

					<input type="submit" value="Save Changes" />
				</form>
			</section>
		</main>
		<footer id="app-footer"></footer>
	</body>
</html>
