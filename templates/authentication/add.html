{% load static %}


<!DOCTYPE html>

<html>
	<head>
		<meta charset="UTF-8" />
		<title>Admin</title>
		<meta name="description" content="This Is Our Library website" />
		<link rel="stylesheet" type="text/css" href="{% static 'CSS/add.css' %}">
	</head>
	<body>
		<div class="container">
			<form action="" method="post"  id="addBookForm" enctype="multipart/form-data">
                {% csrf_token %}
				<h2>Add Book</h2>
				<div class="content">
					<div class="input">
						<label for="img">
							Cover 
						</label>
						<input type="file" id="img" name="img" />
					</div>

					<div class="input">
						<label for="id1">
							ID </label
						>
						<input
							type="text"
							id="id1"
                            name="id1"
							placeholder="Changed Book ID"
							required />
					</div>

					<div class="input">
						<label for="title"> Book Title </label>
						<input
							type="text"
							id="title"
                            name="title"
							placeholder="New Book Name.."
							required />
					</div>

					<div class="input">
						<label for="author">
							Author </label
						>
						<input type="text" id="author" name="author" placeholder="New Author Name.." />
					</div>

						<div class="input">
							<label for="book"> Category </label>
							<select name="book" id="book" class="input">
								<optgroup>
								<option value="Horror">Horror</option>
								<option value="Childrens">Childrens</option>
								<option value="Fantasy">Fantasy</option>
								<option value="Historical Fiction">Historical Fiction</option>
								<option value="Science Fiction">Science Fiction</option>

								
							</optgroup>
						</select>
					</div>

					<div class="input">
						<label for="description"> Description</label>
						<textarea
						id="description"
							name="desc"
							cols="10"
							rows="5"
							placeholder="Edit Book Description"></textarea>
					</div>
				</div>

				<div class="buttons">
					<div class="button">
						   <a href="{% url 'admin_home' %}">Back</a>
					</div>
					<div class="button">
						<button >Add</button>
					</div>
				</div>
			</form>
		</div>

		<script src="JS/addbook.js"></script>
	</body>
</html>
